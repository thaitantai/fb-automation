version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fb_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: fb_automation_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # redis:
  #   image: redis:7-alpine
  #   container_name: fb_redis
